version: 0.2

phases:
  install:
    commands:
      - echo "Setting up SSH..."
      - mkdir -p ~/.ssh
      - aws ssm get-parameter --name "/health-check/ec2-ssh-key" --with-decryption --query "Parameter.Value" --output text > ~/.ssh/deploy_key
      - chmod 600 ~/.ssh/deploy_key
      - ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

  build:
    commands:
      - echo "Deploying to EC2..."
      - ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "mkdir -p /home/ec2-user/app"
      - scp -i ~/.ssh/deploy_key -r * $EC2_USER@$EC2_HOST:/home/ec2-user/app/
      - ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "cd /home/ec2-user/app && pip3 install -r requirements.txt && pkill -f 'python app.py' || true && nohup python3 app.py > app.log 2>&1 &"

  post_build:
    commands:
      - echo "Deployment complete"