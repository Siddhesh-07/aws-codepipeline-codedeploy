version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install -r requirements.txt

  build:
    commands:
      - echo "Running tests..."
      - pytest tests/ -v

  post_build:
    commands:
      - echo "Build and tests completed successfully"

artifacts:
  files:
    - '**/*'
    