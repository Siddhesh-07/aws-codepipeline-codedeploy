version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - python3 -m pip install -r requirements.txt

  build:
    commands:
      - echo "Running tests..."
      - python3 -m pytest tests/ -v

  post_build:
    commands:
      - echo "Build successful"

artifacts:
  files:
    - '**/*'
  discard-paths: no